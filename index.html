<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>me-shi Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose-50: #fff1f2;
      --rose-100: #ffe4e6;
      --rose-200: #fecdd3;
      --rose-300: #fda4af;
      --rose-500: #f43f5e;
      --rose-600: #e11d48;
      --rose-700: #be123c;
      --amber-50: #fffbeb;
      --amber-100: #fef3c7;
      --amber-800: #92400e;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --border: #fecdd3;
      --muted: #9ca3af;
      --header-h: 64px;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      margin: 0;
      background: #fffafb;
      color: var(--gray-800);
      padding-top: var(--header-h);
    }

    /* ===== STICKY HEADER ===== */
    .sticky-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      z-index: 50;
      background: #f5d0d7;
      border-bottom: 1px solid rgba(251,113,133,0.25);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .sticky-header-inner {
      height: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-title {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--gray-800);
    }
    .header-sub {
      font-size: 0.75rem;
      color: var(--rose-700);
      margin-left: 4px;
    }

    /* ===== MAIN WRAP ===== */
    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    /* ===== CONTROLS CARD ===== */
    .controls {
      background: #fff;
      border: 1px solid var(--rose-100);
      border-radius: 1.5rem;
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 8px rgba(244,63,94,0.06);
    }
    .controls-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }
    .controls-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
    }
    .divider-v {
      width: 1px;
      height: 44px;
      background: var(--rose-100);
      margin: 0 4px;
      align-self: flex-end;
      margin-bottom: 2px;
    }
    label.field-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--rose-700);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }
    .hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 5px;
      line-height: 1.45;
    }

    input[type="datetime-local"],
    input[type="text"],
    input[type="number"] {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.85rem;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1.5px solid var(--rose-200);
      background: var(--rose-50);
      color: var(--gray-800);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input[type="datetime-local"]:focus,
    input[type="text"]:focus {
      border-color: var(--rose-500);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(244,63,94,0.1);
    }
    input.w-datetime { min-width: 210px; }
    input.w-limit { width: 90px; }
    input.w-filter { min-width: 220px; }

    /* ===== BUTTONS ===== */
    .btn {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 10px 18px;
      border-radius: 999px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--rose-500);
      color: #fff;
      border-color: var(--rose-500);
      box-shadow: 0 2px 8px rgba(244,63,94,0.25);
    }
    .btn-primary:hover {
      background: var(--rose-600);
      border-color: var(--rose-600);
      transform: scale(1.02);
    }
    .btn-secondary {
      background: #fff;
      color: var(--rose-700);
      border-color: var(--rose-200);
    }
    .btn-secondary:hover {
      background: var(--rose-50);
      border-color: var(--rose-300);
    }
    .btn-secondary.active {
      background: var(--rose-500);
      color: #fff;
      border-color: var(--rose-500);
      box-shadow: 0 2px 8px rgba(244,63,94,0.25);
    }
    .btn-secondary.active:hover {
      background: var(--rose-600);
      border-color: var(--rose-600);
    }

    /* ===== STATUS ===== */
    .status-bar {
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .status-text {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .pill {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border: 1.5px solid var(--rose-200);
      border-radius: 999px;
      color: var(--rose-700);
      background: var(--rose-50);
    }

    /* ===== DAY SECTIONS ===== */
    .day {
      margin-bottom: 28px;
    }
    .day-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 10px;
      margin-bottom: 12px;
      border-bottom: 2px solid var(--rose-100);
    }
    .day-header h2 {
      font-size: 0.95rem;
      font-weight: 700;
      margin: 0;
      color: var(--gray-800);
    }

    /* ===== ITEM GRID ===== */
    .item {
      display: grid;
      grid-template-columns: 1fr 260px 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .card {
      background: #fff;
      border: 1.5px solid var(--rose-100);
      border-radius: 1.25rem;
      padding: 14px;
      box-shadow: 0 1px 6px rgba(244,63,94,0.05);
      transition: box-shadow 0.2s;
    }
    .card:hover {
      box-shadow: 0 4px 16px rgba(244,63,94,0.1);
    }
    .card-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--rose-500);
      letter-spacing: 0.04em;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    img {
      width: 100%;
      height: auto;
      border-radius: 10px;
      background: var(--gray-100);
      display: block;
    }

    /* ===== META CARD ===== */
    .meta-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .jobid {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.68rem;
      color: var(--gray-500);
      word-break: break-all;
      background: var(--gray-50);
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid var(--gray-200);
    }
    .created {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .fav-text {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gray-800);
      line-height: 1.35;
      background: var(--rose-50);
      border-radius: 10px;
      padding: 10px 12px;
      border: 1.5px solid var(--rose-100);
    }
    .fav-text::before {
      content: "❤️ ";
    }

    /* ===== FEEDBACK ===== */
    .feedback-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1.5px solid;
    }
    .feedback-badge.good {
      background: #f0fdf4;
      border-color: #86efac;
      color: #15803d;
    }
    .feedback-badge.bad {
      background: #fff1f2;
      border-color: var(--rose-200);
      color: var(--rose-700);
    }
    .feedback-badge.none {
      background: var(--gray-50);
      border-color: var(--gray-200);
      color: var(--gray-500);
      font-weight: 400;
    }

    .no-image {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }

    /* ===== ERROR ===== */
    .error-box {
      background: #fff3f3;
      border: 1.5px solid #ffd2d2;
      padding: 14px 18px;
      border-radius: 1rem;
      margin-top: 14px;
      font-size: 0.82rem;
      white-space: pre-wrap;
      color: #b91c1c;
    }
    .empty-msg {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 48px 0;
    }

    /* ===== LOADING SPINNER ===== */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 48px 0;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--rose-200);
      border-top-color: var(--rose-500);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--rose-600);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .item { grid-template-columns: 1fr; }
      .controls-row { flex-direction: column; align-items: stretch; }
      .divider-v { display: none; }
    }
    @media (max-width: 500px) {
      .page-wrap { padding: 16px 12px 40px; }
      .controls { padding: 16px; border-radius: 1.25rem; }
    }
  </style>
</head>
<body>

  <!-- Sticky Header -->
  <header class="sticky-header">
    <div class="sticky-header-inner">
      <div>
        <span class="header-title">🐺 me-shi Gallery</span>
        <span class="header-sub">before / input / after</span>
      </div>
    </div>
  </header>

  <div class="page-wrap">

    <!-- Controls -->
    <div class="controls">
      <div class="controls-row">
        <!-- Date range -->
        <div>
          <label class="field-label">表示期間（JST）</label>
          <input id="sinceJst" class="w-datetime" type="datetime-local" />
          <div class="hint">指定した日時「以降」のデータを表示します</div>
        </div>

        <!-- Preset buttons -->
        <div>
          <label class="field-label">クイック選択</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button id="presetToday" class="btn btn-secondary">今日 0:00〜</button>
            <button id="preset24h" class="btn btn-secondary">過去24時間</button>
            <button id="preset7d" class="btn btn-secondary">過去7日</button>
            <button id="presetToyotaLink" class="btn btn-secondary">トヨタ合成リンク実施期間</button>
            <button id="presetToyotaFinal" class="btn btn-secondary">トヨタ合成最終週</button>
          </div>
        </div>

        <div class="divider-v"></div>

        <!-- Status filter buttons -->
        <div>
          <label class="field-label">表示種別</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button id="filterGenerated" class="btn btn-secondary">生成成功</button>
            <button id="filterNg" class="btn btn-secondary">フィルタリングNG</button>
          </div>
          <div class="hint">APIに status を渡してサーバ側で絞り込みます</div>
        </div>

        <div class="divider-v"></div>

        <!-- Limit -->
        <div>
          <label class="field-label">最大取得件数</label>
          <input id="limit" class="w-limit" type="number" value="200" />
          <div class="hint">多いほど重くなります</div>
        </div>

        <!-- Load button -->
        <div style="margin-bottom:2px;">
          <button id="load" class="btn btn-primary">読み込み</button>
        </div>

        <div class="divider-v"></div>

        <!-- Filter -->
        <div style="flex:1;min-width:200px;">
          <label class="field-label">絞り込み（favorite / job_id）</label>
          <input id="filter" class="w-filter" type="text" placeholder="例: パンケーキ / 3428ccf..." style="width:100%;" />
          <div class="hint">読み込み済みデータを画面内で絞り込みます（通信しません）</div>
        </div>

        <div class="divider-v"></div>

        <!-- Feedback filter -->
        <div>
          <label class="field-label">フィードバック絞り込み</label>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <div style="display:flex;gap:8px;">
              <button id="fbWolfy" class="btn btn-secondary btn-fb" data-fb="wolfy">🐺 wolfy</button>
              <button id="fbMyself" class="btn btn-secondary btn-fb" data-fb="myself">🙋 myself</button>
            </div>
            <div style="display:flex;gap:8px;">
              <button id="fbGood" class="btn btn-secondary btn-fb" data-fb="good">👍 good</button>
              <button id="fbBad" class="btn btn-secondary btn-fb" data-fb="bad">👎 bad</button>
            </div>
          </div>
          <div class="hint">AND検索。未選択なら全件表示（通信しません）</div>
        </div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-bar">
      <span id="status" class="status-text">期間を選択して「読み込み」を押してください</span>
      <span id="statusPill" class="pill">status: GENERATED</span>
    </div>

    <!-- Content -->
    <div id="root"></div>

  </div>

  <script>
    const API_URL = "https://1x7wkzlgv2.execute-api.ap-northeast-1.amazonaws.com/prd/gallery";

    const elSinceJst  = document.getElementById("sinceJst");
    const elLimit     = document.getElementById("limit");
    const elFilter    = document.getElementById("filter");
    const elLoad      = document.getElementById("load");
    const elToday     = document.getElementById("presetToday");
    const el24h       = document.getElementById("preset24h");
    const el7d        = document.getElementById("preset7d");
    const elToyotaLink = document.getElementById("presetToyotaLink");
    const elToyotaFinal = document.getElementById("presetToyotaFinal");
    const elStatus    = document.getElementById("status");
    const elStatusPill = document.getElementById("statusPill");
    const root        = document.getElementById("root");

    const elFilterGenerated = document.getElementById("filterGenerated");
    const elFilterNg = document.getElementById("filterNg");

    let lastData      = null;
    let inflight      = null;
    let filterTimer   = null;
    let activePreset  = null;

    let activeStatus = "GENERATED";

    // feedback フィルタ状態（null = 未選択）
    let fbWho  = null; // "wolfy" | "myself" | null
    let fbEval = null; // "good"  | "bad"    | null

    const presetBtns = { today: elToday, "24h": el24h, "7d": el7d, toyotaLink: elToyotaLink, toyotaFinal: elToyotaFinal };

    function setActivePreset(key) {
      activePreset = key;
      Object.entries(presetBtns).forEach(([k, btn]) => {
        if (k === key) btn.classList.add("active");
        else btn.classList.remove("active");
      });
    }

    function clearActivePreset() {
      activePreset = null;
      Object.values(presetBtns).forEach(btn => btn.classList.remove("active"));
    }

    function setActiveStatus(st) {
      activeStatus = st;
      elFilterGenerated.classList.toggle("active", st === "GENERATED");
      elFilterNg.classList.toggle("active", st === "VALIDATION_FAILED");
      elStatusPill.textContent = `status: ${st}`;
    }

    elSinceJst.addEventListener("input", clearActivePreset);

    function escapeHtml(s) {
      return (s ?? "").toString()
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }

    function toUtcIso(value) {
      if (!value) return null;
      const [datePart, timePart] = value.split("T");
      const [y,m,d] = datePart.split("-").map(Number);
      const [hh,mm] = timePart.split(":").map(Number);
      const utc = new Date(Date.UTC(y, m-1, d, hh-9, mm, 0));
      return utc.toISOString().replace(".000Z", "+00:00");
    }

    function setPresetFromNow(minutesAgo) {
      const jstNow = new Date(Date.now() + 9*60*60*1000);
      const target = new Date(jstNow.getTime() - minutesAgo*60*1000);
      const pad = n => String(n).padStart(2,"0");
      elSinceJst.value = `${target.getUTCFullYear()}-${pad(target.getUTCMonth()+1)}-${pad(target.getUTCDate())}T${pad(target.getUTCHours())}:${pad(target.getUTCMinutes())}`;
    }

    function setPresetTodayMidnight() {
      const jstNow = new Date(Date.now() + 9*60*60*1000);
      const pad = n => String(n).padStart(2,"0");
      elSinceJst.value = `${jstNow.getUTCFullYear()}-${pad(jstNow.getUTCMonth()+1)}-${pad(jstNow.getUTCDate())}T00:00`;
    }

    function setPresetDate(year, month, day) {
      const pad = n => String(n).padStart(2,"0");
      elSinceJst.value = `${year}-${pad(month)}-${pad(day)}T00:00`;
    }

    function normalize(s) {
      return (s ?? "").toString().trim().toLowerCase();
    }

    // Feedback ボタンのトグル
    function updateFbButtons() {
      document.getElementById("fbWolfy").classList.toggle("active", fbWho === "wolfy");
      document.getElementById("fbMyself").classList.toggle("active", fbWho === "myself");
      document.getElementById("fbGood").classList.toggle("active", fbEval === "good");
      document.getElementById("fbBad").classList.toggle("active", fbEval === "bad");
    }

    document.getElementById("fbWolfy").addEventListener("click", () => {
      fbWho = fbWho === "wolfy" ? null : "wolfy";
      updateFbButtons();
      rerenderByFilter();
    });
    document.getElementById("fbMyself").addEventListener("click", () => {
      fbWho = fbWho === "myself" ? null : "myself";
      updateFbButtons();
      rerenderByFilter();
    });
    document.getElementById("fbGood").addEventListener("click", () => {
      fbEval = fbEval === "good" ? null : "good";
      updateFbButtons();
      rerenderByFilter();
    });
    document.getElementById("fbBad").addEventListener("click", () => {
      fbEval = fbEval === "bad" ? null : "bad";
      updateFbButtons();
      rerenderByFilter();
    });

    function matchFeedback(feedback) {
      // どちらも未選択なら全件通す
      if (!fbWho && !fbEval) return true;
      if (!feedback) return false;
      const lower = feedback.toLowerCase();
      // 選択されてる条件を両方満たす必要がある（AND）
      if (fbWho && !lower.startsWith(fbWho + "_")) return false;
      if (fbEval && !lower.endsWith("_" + fbEval)) return false;
      return true;
    }

    function applyFilter(data, q) {
      q = normalize(q);
      const hasFbFilter = fbWho || fbEval;
      if (!q && !hasFbFilter) return data;
      const days = [];
      for (const day of (data.days || [])) {
        const items = (day.items || []).filter(it => {
          const textMatch = !q ||
            normalize(it.favorite_thing || "").includes(q) ||
            normalize(it.job_id || "").includes(q);
          return textMatch && matchFeedback(it.feedback);
        });
        if (items.length) days.push({ date: day.date, items });
      }
      return { ...data, days, count: days.reduce((a,d)=>a+d.items.length,0) };
    }

    function feedbackBadgeHtml(feedback) {
      if (!feedback) {
        return `<span class="feedback-badge none">💬 フィードバックなし</span>`;
      }
      const lower = feedback.toLowerCase();
      if (lower === "good") {
        return `<span class="feedback-badge good">👍 good</span>`;
      } else if (lower === "bad") {
        return `<span class="feedback-badge bad">👎 bad</span>`;
      } else {
        // その他の値はそのまま表示
        return `<span class="feedback-badge none">💬 ${escapeHtml(feedback)}</span>`;
      }
    }

    function printBadgeHtml(printVal) {
        if (printVal === "○") {
            return `<span class="feedback-badge good">🖨️ 印刷済み</span>`;
        }
        return `<span class="feedback-badge none">🖨️ 未印刷</span>`;
    }

    function showLoading() {
      root.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <span class="loading-text">読み込み中...</span>
        </div>`;
    }

    function render(data) {
      root.innerHTML = "";
      const total = data?.count ?? 0;

      elStatus.innerHTML = total
        ? `<span class="status-text">表示件数：</span><span class="pill">${total} 件</span>`
        : `<span class="status-text">該当データがありません</span>`;

      if (!total) {
        root.innerHTML = `<div class="empty-msg">📭 期間を広げるか、絞り込みを解除してください</div>`;
        return;
      }

      const isNg = (activeStatus === "VALIDATION_FAILED");

      for (const day of (data.days || [])) {
        const dayDiv = document.createElement("div");
        dayDiv.className = "day";
        dayDiv.innerHTML = `
          <div class="day-header">
            <h2>📅 ${escapeHtml(day.date)}</h2>
            <span class="pill">JST</span>
            <span class="pill">${day.items.length} 件</span>
          </div>`;

        for (const it of (day.items || [])) {
          const beforeHtml = it.before_url
            ? `<img loading="lazy" src="${it.before_url}" alt="before">`
            : `<div class="no-image">${isNg ? "NG 入力画像なし" : "before 画像なし"}</div>`;

          const afterHtml = it.after_url
            ? `<img loading="lazy" src="${it.after_url}" alt="after">`
            : `<div class="no-image">${isNg ? "出力画像なし（NG判定）" : "after 画像なし"}</div>`;

          const item = document.createElement("div");
          item.className = "item";
          item.innerHTML = `
            <div class="card">
              <div class="card-label">${isNg ? "📸 Input Image（NG）" : "📸 Before（元画像）"}</div>
              ${beforeHtml}
            </div>

            <div class="card meta-card">
              <div class="card-label">✏️ Input（好きなもの）</div>
              <div class="jobid">${escapeHtml(it.job_id)}</div>
              <div class="created">${escapeHtml(it.created_at)}</div>
              <div class="fav-text">${escapeHtml(it.favorite_thing || "")}</div>
              ${feedbackBadgeHtml(it.feedback)}
              ${printBadgeHtml(it.print)} 
            </div>

            <div class="card">
              <div class="card-label">${isNg ? "🚫 After（生成なし）" : "🎨 After（生成画像）"}</div>
              ${afterHtml}
            </div>
          `;
          dayDiv.appendChild(item);
        }
        root.appendChild(dayDiv);
      }
    }

    async function fetchData() {
      const sinceIsoUtc = toUtcIso(elSinceJst.value);
      const limit = (elLimit.value || "200").trim();

      if (!sinceIsoUtc) {
        elStatus.textContent = "表示期間（JST）を入力してください";
        return;
      }

      if (inflight) inflight.abort();
      inflight = new AbortController();

      const params = new URLSearchParams();
      params.set("since", sinceIsoUtc);
      params.set("limit", limit);
      params.set("status", activeStatus);

      showLoading();
      elStatus.textContent = "読み込み中...";

      try {
        const res = await fetch(`${API_URL}?${params.toString()}`, {
          method: "GET",
          signal: inflight.signal
        });
        if (!res.ok) {
          const txt = await res.text();
          elStatus.textContent = `エラー: ${res.status}`;
          root.innerHTML = `<div class="error-box">${escapeHtml(txt)}</div>`;
          return;
        }
        lastData = await res.json();
        render(applyFilter(lastData, elFilter.value));
      } catch (e) {
        if (String(e.name) === "AbortError") return;
        elStatus.textContent = "通信エラー";
        root.innerHTML = `<div class="error-box">${escapeHtml(String(e))}</div>`;
      }
    }

    function rerenderByFilter() {
      if (!lastData) return;
      render(applyFilter(lastData, elFilter.value));
    }

    // Events
    elLoad.addEventListener("click", () => { clearActivePreset(); fetchData(); });

    elFilter.addEventListener("input", () => {
      clearTimeout(filterTimer);
      filterTimer = setTimeout(rerenderByFilter, 150);
    });

    elToday.addEventListener("click", () => {
      setPresetTodayMidnight();
      setActivePreset("today");
      fetchData();
    });
    el24h.addEventListener("click", () => {
      setPresetFromNow(24*60);
      setActivePreset("24h");
      fetchData();
    });
    el7d.addEventListener("click", () => {
      setPresetFromNow(7*24*60);
      setActivePreset("7d");
      fetchData();
    });
    elToyotaLink.addEventListener("click", () => {
      setPresetDate(2026, 2, 17);
      setActivePreset("toyotaLink");
      fetchData();
    });
    elToyotaFinal.addEventListener("click", () => {
      setPresetDate(2026, 3, 2);
      setActivePreset("toyotaFinal");
      fetchData();
    });

    elFilterGenerated.addEventListener("click", () => {
      setActiveStatus("GENERATED");
      fetchData();
    });
    elFilterNg.addEventListener("click", () => {
      setActiveStatus("VALIDATION_FAILED");
      fetchData();
    });

    // Init
    setPresetDate(2026, 2, 17);
    setActivePreset("toyotaLink");
    setActiveStatus("GENERATED");
    fetchData();
  </script>
</body>
</html>
